name: Pobierz licytacje KAS

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    name: Scraping i generowanie raportu
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zaleznosci
        run: pip install -r kas-licytacje-agent/requirements.txt

      - name: Uruchom scrapera
        run: cd kas-licytacje-agent && python main.py

      - name: Wyslij raport na GitHub Pages
        run: |
          git config --global user.name "KAS Bot"
          git config --global user.email "bot@kas"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add kas-licytacje-agent/docs/
          git diff --cached --quiet || git commit -m "Raport KAS $(date +'%d.%m.%Y')"
          git push
